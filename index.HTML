<!DOCTYPE html>
<html lang="ru">
<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Pills</title>

    <link
        rel="stylesheet"
        href="style.css"
    >

</head>

<body>

    <!-- HEADER -->

    <header class="header">

        <div class="container header-content">

            <div class="logo-wrapper">

                <div class="logo-icon">
                    💊
                </div>

                <div>

                    <h1 class="logo-title">
                        Pills
                    </h1>

                    <p class="logo-subtitle">
                        Каталог лекарственных препаратов
                    </p>

                </div>

            </div>

            <button class="login-btn">
                Вход
            </button>

        </div>

    </header>

    <!-- навигация -->

    <nav class="nav">

        <div class="container nav-content">

            <button
                id="allTab"
                class="nav-tab active"
            >
                Все препараты
            </button>

            <button
                id="favoriteTab"
                class="nav-tab"
            >
                Избранное
            </button>

        </div>

    </nav>

    <!-- поиск и фильтры -->

    <section class="search-section">

        <div class="container">

            <input
                type="text"
                id="searchInput"
                class="search-input"
                placeholder="Поиск по названию или показаниям..."
            >

            <div class="filters">

                <button
                    class="filter-btn active"
                    data-form=""
                >
                    Все формы
                </button>

                <button
                    class="filter-btn"
                    data-form="Таблетки"
                >
                    Таблетки
                </button>

                <button
                    class="filter-btn"
                    data-form="Капсулы"
                >
                    Капсулы
                </button>

                <button
                    class="filter-btn"
                    data-form="Инъекции"
                >
                    Инъекции
                </button>

                <button
                    class="filter-btn"
                    data-form="Капли"
                >
                    Капли
                </button>

                <button
                    class="filter-btn"
                    data-form="Спрей"
                >
                    Спрей
                </button>

                <button
                    class="filter-btn"
                    data-form="Гель"
                >
                    Гель
                </button>

            </div>

        </div>

    </section>

    <!-- основной контент -->

    <main class="main-content">

        <div class="container">

            <h2
                id="medicineCount"
                class="medicine-counter"
            >
                Всего препаратов: 0
            </h2>

            <div
                id="medicinesGrid"
                class="medicines-grid"
            >

                <!-- Карточки создаются через JS -->

            </div>

        </div>

    </main>

    <!-- MODAL -->

    <div
        id="medicineModal"
        class="modal"
    >

        <div class="modal-overlay"></div>

        <div class="modal-content">

            <button
                id="closeModal"
                class="close-btn"
            >
                ✕
            </button>

            <div id="modalBody">

                <!-- Контент препарата -->

            </div>

        </div>

    </div>

    <script src="app.js"></script>

</body>
</html>
